<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonder — Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #7c4dff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 { margin: 0 0 0.5rem; font-weight: 500; }
        p { color: #999; font-size: 0.9rem; }
        .error { color: #ef5350; }
        a { color: #7c4dff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Returning to Sonder...</h2>
        <p id="message">Please wait</p>
    </div>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var code = params.get('code');
            var state = params.get('state');
            var error = params.get('error');

            if (error) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('title').textContent = 'Authorization denied';
                document.getElementById('message').innerHTML = 'You can close this tab and try again from Sonder.';
                document.getElementById('message').className = 'error';
                return;
            }

            if (!code) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('title').textContent = 'Something went wrong';
                document.getElementById('message').innerHTML = 'No authorization code received. Please try again from Sonder.';
                document.getElementById('message').className = 'error';
                return;
            }

            // Build the custom scheme redirect
            var redirect = 'sonder://inoreader-callback?code=' + encodeURIComponent(code);
            if (state) {
                redirect += '&state=' + encodeURIComponent(state);
            }

            // Redirect to the app
            window.location.href = redirect;

            // Fallback: if the redirect didn't work after 3 seconds
            setTimeout(function() {
                document.getElementById('title').textContent = 'Could not open Sonder';
                document.getElementById('message').innerHTML =
                    'Make sure Sonder is installed and try again.<br><br>' +
                    '<a href="' + redirect + '">Tap here to retry</a>';
                document.getElementById('spinner').style.display = 'none';
            }, 3000);
        })();
    </script>
</body>
</html>
